<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <title>APOD call</title>
  <style type="text/css">
  	img{
    width: 100%;
	}
	body{
		padding-left: 6px;
		padding-right: 6px;
	}
  </style>
</head>
<body>
  <h4><b><center>ASTRONOMY IMAGE OF THE DAY<center></b></h4>
  <hr>
  
  <center><img id="apod_img_id"/></center>
  
  <iframe id="apod_vid_id" type="text/html" width="640" height="385" frameborder="0"></iframe>
  <br>
  <div class="container">
  	<center><button type="button" class="btn btn-primary"><a id="a_tag_id" download="apod.jpeg" style="color: white">Download the Image</a></button></center>
  </div>

  <br>
  <p id="copyright"></p>
  
  <h4 id="apod_title"></h4>
  <p align="justify" id="apod_explaination"></p>
  <br/>

</body>
<script type="text/javascript">
	var url = "https://api.nasa.gov/planetary/apod?api_key=NNKOjkoul8n1CH18TWA9gwngW1s1SmjESPjNoUFo";


$.ajax({
  url: url,
  success: function(result){
  if("copyright" in result) {
    $("#copyright").text("Image Credits: " + result.copyright);
  }
  else {
    $("#copyright").text("Image Credits: " + "Public Domain");
  }
  
  if(result.media_type == "video") {
    $("#apod_img_id").css("display", "none"); 
    $("#apod_vid_id").attr("src", result.url);
  }
  else {
    $("#apod_vid_id").css("display", "none"); 
    $("#apod_img_id").attr("src", result.url);
  }
  $("#returnObject").text(JSON.stringify(result, null, 4));  
  $("#apod_explaination").text(result.explanation);
  $("#apod_title").text(result.title);
  $("#a_tag_id").attr('href',result.hdurl);
}
});
</script>
</html>
